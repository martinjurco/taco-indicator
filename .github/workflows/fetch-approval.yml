name: Fetch Trump Approval Data

on:
  schedule:
    - cron: '0 10 * * 1'   # Every Monday at 10:00 UTC
  workflow_dispatch:         # Also runnable manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and commit approval data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/fetch_approval.py -o fetch_approval.py
          python fetch_approval.py
